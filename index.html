<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Songkran Blessing 2026</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.4);
            --blur: blur(15px);
            --primary: #007aff; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow-x: hidden; background: #d0f0f5; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Pyidaungsu", sans-serif;
            user-select: none;
            /* ဒီစာကြောင်းက နှိပ်ရင် အပြာရောင်ပေါ်တာကို ဖျောက်ပေးတာပါ */
            -webkit-tap-highlight-color: transparent;
        }

        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .drop {
            position: absolute; width: 10px; height: 16px;
            background-color: rgba(173, 216, 230, 0.6);
            clip-path: path('M5,0 C5,0 10,7 10,10 A5,5 0 1,1 0,10 C0,7 5,0 5,0 Z');
            animation: fallFull linear infinite;
        }
        @keyframes fallFull { from { transform: translateY(-50px); } to { transform: translateY(110vh); } }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 10; align-items: center; }
        .hidden { display: none !important; }

        /* Custom Alert */
        .ios-alert-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 150;
            display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .ios-alert {
            background: rgba(255, 255, 255, 0.95); width: 290px; border-radius: 14px;
            text-align: center; animation: alertShow 0.3s ease-out; overflow: hidden;
        }
        @keyframes alertShow { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        .ios-alert-body { padding: 25px 20px; color: #000; font-size: 16px; line-height: 1.6; }
        .ios-alert-body b { font-size: 20px; display: block; margin-bottom: 10px; color: #1a4d31; }
        .ios-alert-btn { border-top: 1px solid rgba(0,0,0,0.1); padding: 15px; color: var(--primary); font-weight: 600; font-size: 18px; cursor: pointer; }

        /* Creator UI Fix */
        #creator-screen { background: #fcfaf2; display: none; padding: 20px; z-index: 110; overflow-y: auto; text-align: center; width: 100%; box-sizing: border-box; }
        textarea { width: 100%; max-width: 320px; height: 80px; border-radius: 10px; border: 1.5px solid #ddd; padding: 12px; font-size: 15px; margin: 0 auto 10px auto; color: #333; resize: none; display: block; box-sizing: border-box; }

        .heart-container { margin: 15px 0; display: flex; flex-direction: column; align-items: center; }
        #count-display { font-size: 1.5rem; font-weight: bold; color: #ff4757; margin-bottom: 5px; }
        
        /* အသည်းပုံ Button အပြာရောင်မပေါ်အောင် ပြင်ဆင်ခြင်း */
        .btn-heart { 
            font-size: 50px; background: none; border: none; cursor: pointer; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); 
            transition: transform 0.1s;
            outline: none; /* Focus ဖြစ်ရင် လာတဲ့ဘောင်ကို ဖျောက်မယ် */
            -webkit-tap-highlight-color: transparent; /* နှိပ်ရင် အပြာရောင်ပေါ်တာ ဖျောက်မယ် */
        }
        .btn-heart:active { transform: scale(0.85); }

        .btn { padding: 13px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; max-width: 320px; margin-top: 10px; transition: 0.3s; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .btn-disabled { background: #ccc !important; color: #888 !important; cursor: not-allowed; }
        .btn-green { background: #1a4d31; color: white; }
        .btn-yellow { background: #ffd700; color: #333; }
        .btn-gray { background: #eee; color: #666; }

        .qr-frame { background: white; padding: 15px; border: 6px solid #1a4d31; border-radius: 12px; display: inline-block; position: relative; margin: 10px 0; }
        #qrcode-img { width: 220px; height: 220px; display: block; }
        
        .marquee { width: 100%; overflow: hidden; margin-top: 15px; background: rgba(255,255,255,0.3); border-radius: 10px; padding: 8px 0; }
        .marquee p { display: inline-block; white-space: nowrap; animation: marqueeRun 12s linear infinite; margin: 0; color: #1a4d55; font-size: 1rem; font-weight: 500; }
        @keyframes marqueeRun { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <video id="bg-audio-four" loop style="display:none;"><source src="four.mp4" type="video/mp4"></video>
    <div id="rain-container"></div>

    <div class="ios-alert-bg" id="global-alert">
        <div class="ios-alert">
            <div class="ios-alert-body">
                <b id="alert-title">💦 သင်္ကြန်ဆုမွန်တောင်း 💦</b>
                <span id="alert-msg"></span><br>
                <span id="alert-hearts" style="font-weight:bold; color:#ff4757; font-size:1.2rem;"></span>
            </div>
            <div id="alert-btn" class="ios-alert-btn">အိုကေ</div>
        </div>
    </div>

    <div id="first-screen" class="screen" style="justify-content: flex-end; padding-bottom: 50px;">
        <div onclick="handleFirstBowl()" style="width: 85%; max-width: 360px; cursor: pointer;">
            <img src="first.png" style="width: 100%;" alt="Bowl">
        </div>
        <div class="btn btn-green" style="max-width:200px;" onclick="handleFirstBowl()">ရေလောင်းပါရစေ 💦</div>
    </div>

    <div id="splash-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; background: #000; z-index: 80;">
        <video id="vid-splash" playsinline style="width: 85%; max-height: 70%; border-radius: 15px;"><source src="second.mp4" type="video/mp4"></video>
    </div>

    <div id="final-screen" class="screen hidden" style="background: rgba(208, 240, 245, 0.8); justify-content: center;">
        <div id="final-card" style="display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: var(--blur); border-radius: 24px; border: 1px solid var(--border); padding: 15px;">
            <div id="heart-count-view" style="font-weight:bold; color:#ff4757; margin-bottom:5px; font-size:1.3rem;"></div>
            <div style="width:100%; border-radius:18px; overflow:hidden; line-height:0;">
                <video id="vid-music" playsinline loop style="width:100%"><source src="third.mp4" type="video/mp4"></video>
            </div>
            <div class="marquee"><p id="display-text-marquee"></p></div>
            
            <button class="btn btn-green" style="margin-top:20px;" onclick="showCreator()">Send to Friend 💌</button>
            <button class="btn btn-gray" onclick="window.location.reload()">Thank You</button>
        </div>
    </div>

    <div id="creator-screen" class="screen">
        <h3 style="color:#1a4d31; margin-top: 0;">သင်္ကြန်စာလွှာ ပြင်ဆင်ရန်</h3>
        
        <textarea id="messageInput" oninput="checkInputs()" placeholder="သူငယ်ချင်းဆီ ပို့ချင်တဲ့စာကို ဒီမှာရေးပါ..."></textarea>
        
        <div class="heart-container">
            <div id="count-display">0 ❤️</div>
            <button class="btn-heart" onclick="addHeart()">❤️</button>
            <span style="font-size: 13px; color: #666; margin-top: 5px;">အသည်းပုံကို နှိပ်ပေးပါ</span>
        </div>

        <button id="qr-btn" class="btn btn-disabled" onclick="generateQR()" disabled>OK (QR ထုတ်မယ်)</button>
        <button class="btn btn-gray" onclick="window.location.reload()">ပြန်ထွက်မယ်</button>
        
        <div id="qr-output" class="hidden" style="margin-top: 20px;">
            <div class="qr-frame" id="capture-area">
                <div id="qrcode-hidden" style="display:none;"></div>
                <img id="qrcode-img" src="">
                <div style="position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; font-size:24px; padding:4px; border-radius:5px; border:1px solid #eee;">❤️</div>
            </div>
            <br>
            <button class="btn btn-yellow" onclick="downloadQR()">Save QR Photo</button>
        </div>
    </div>

    <script>
        let heartCount = 0;
        const audioFour = document.getElementById('bg-audio-four');
        const videoMusic = document.getElementById('vid-music');
        const msgInput = document.getElementById('messageInput');
        const qrBtn = document.getElementById('qr-btn');
        const countDisplay = document.getElementById('count-display');

        const urlParams = new URLSearchParams(window.location.search);
        const compressedData = urlParams.get('cmsg');
        let currentMsg = "အေးမြတဲ့ သင်္ကြန်ရေနဲ့အတူ စိတ်ချမ်းသာ ကိုယ်ကျန်းမာရှိပါစေ။";
        let receivedHearts = 0;

        if (compressedData) {
            try {
                const decoded = LZString.decompressFromEncodedURIComponent(compressedData);
                const parts = decoded.split("|||");
                currentMsg = parts[0];
                receivedHearts = parts[1] || 0;
                document.getElementById('display-text-marquee').innerText = currentMsg;
                document.getElementById('heart-count-view').innerText = receivedHearts > 0 ? receivedHearts + " ❤️" : "";
            } catch (e) { console.error(e); }
        }

        function addHeart() {
            heartCount++;
            countDisplay.innerText = heartCount + " ❤️";
            checkInputs();
        }

        function checkInputs() {
            const hasText = msgInput.value.trim().length > 0;
            const hasHearts = heartCount > 0;
            if(hasText && hasHearts) {
                qrBtn.disabled = false;
                qrBtn.classList.remove('btn-disabled');
                qrBtn.classList.add('btn-green');
            } else {
                qrBtn.disabled = true;
                qrBtn.classList.add('btn-disabled');
                qrBtn.classList.remove('btn-green');
            }
        }

        function showPop(title, msg, btnText, callback) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-btn').innerText = btnText;
            document.getElementById('global-alert').style.display = 'flex';
            document.getElementById('alert-btn').onclick = () => {
                document.getElementById('global-alert').style.display = 'none';
                if(callback) callback();
            };
        }

        function handleFirstBowl() {
            audioFour.play().catch(()=>{});
            document.getElementById('alert-hearts').innerText = receivedHearts > 0 ? receivedHearts + " ❤️" : "";
            showPop("💦 သင်္ကြန်ဆုမွန်တောင်း 💦", currentMsg, "ရေလောင်းပါရစေ။", startSplash);
        }

        function startSplash() {
            document.getElementById('first-screen').classList.add('hidden');
            document.getElementById('rain-container').style.display = 'none';
            const sv = document.getElementById('vid-splash');
            document.getElementById('splash-container').style.display = 'flex';
            sv.play();
            sv.onended = () => {
                document.getElementById('splash-container').style.display = 'none';
                startFinal();
            };
        }

        function startFinal() {
            audioFour.pause(); 
            audioFour.currentTime = 0;
            document.getElementById('rain-container').style.display = 'block';
            document.getElementById('final-screen').classList.remove('hidden');
            videoMusic.play();
        }

        function showCreator() {
            document.getElementById('final-screen').classList.add('hidden');
            document.getElementById('creator-screen').style.display = 'flex';
            videoMusic.pause();
        }

        function generateQR() {
            const rawData = msgInput.value.trim() + "|||" + heartCount;
            const compressed = LZString.compressToEncodedURIComponent(rawData);
            const finalLink = window.location.origin + window.location.pathname + "?cmsg=" + compressed;

            const qrBox = document.getElementById('qrcode-hidden');
            qrBox.innerHTML = "";
            new QRCode(qrBox, { text: finalLink, width: 350, height: 350, correctLevel: QRCode.CorrectLevel.L });

            setTimeout(() => {
                const canvas = qrBox.querySelector('canvas');
                if(canvas) {
                    document.getElementById('qrcode-img').src = canvas.toDataURL("image/png");
                    document.getElementById('qr-output').classList.remove('hidden');
                    window.scrollTo(0, document.body.scrollHeight);
                }
            }, 500);
        }

        function downloadQR() {
            html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Thingyan-2026.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Rain
        const container = document.getElementById('rain-container');
        for (let i = 0; i < 35; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(drop);
        }
    </script>
</body>
</html>
